---
- hosts: all
  become: yes
  vars_files:
    - group_vars/webservers/vars.yml
    - group_vars/webservers/vault.yml

  vars:
    pip_install_packages:
      - name: docker

  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- hosts: all
  become: yes
  vars_files:
    - group_vars/webservers/vars.yml
    - group_vars/webservers/vault.yml

  tasks:
    - name: Create directory for Redmine
      file:
        path: /opt/redmine
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create .env file for Redmine
      template:
        src: templates/redmine.env.j2
        dest: /opt/redmine/.env
        owner: root
        group: root
        mode: '0600'

    - name: Run Redmine container
      docker_container:
        name: redmine-server
        image: redmine:5.1.3
        state: started
        restart_policy: always
        ports:
          - "{{ redmine_port }}:3000"
        env_file: /opt/redmine/.env

- hosts: webservers
  become: yes
  vars_files:
    - group_vars/webservers/vars.yml
    - group_vars/webservers/vault.yml

  roles:
    - datadog.datadog